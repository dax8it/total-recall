name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Privacy scan
        run: python scripts/privacy_scan.py
      - name: Install package
        run: python -m pip install -e . pytest
      - name: Run tests
        run: python -m pytest -q
      - name: Install smoke
        run: scripts/install_smoke.sh
